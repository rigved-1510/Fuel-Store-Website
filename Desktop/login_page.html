<body class="font-body-md text-on-surface bg-mesh-gradient min-h-screen flex flex-col items-center justify-center p-margin-mobile">
<!-- Top AppBar (Simplified for Auth context) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md">
<div class="flex justify-center items-center h-16 w-full max-w-7xl mx-auto px-margin-mobile md:px-margin-desktop">
<span class="text-headline-sm font-headline-sm font-bold tracking-tighter text-on-surface">THE FUEL STORE</span>
</div>
</header>
<main class="w-full max-w-[440px] mt-xl mb-lg">
<div class="bg-surface-container-lowest auth-card rounded-xl overflow-hidden border border-outline-variant">
<!-- Auth Selection Tabs -->
<div class="flex border-b border-outline-variant">
<button class="flex-1 py-md text-label-md font-label-md transition-all duration-200 tab-active text-on-surface" id="loginTab" onclick="switchTab('login')">Login</button>
<button class="flex-1 py-md text-label-md font-label-md transition-all duration-200 text-on-surface-variant hover:bg-surface-container-low" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
</div>
<div class="p-md md:p-lg space-y-md">
<!-- Brand Visual Anchor (Subtle) -->
<div class="flex justify-center py-sm">
<div class="w-12 h-12 bg-secondary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary text-[28px]" style="font-variation-settings: &quot;FILL&quot; 1;">sports_soccer</span>
</div>
</div>
<!-- Form Section -->
<form class="space-y-md" id="authForm">
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<input class="w-full px-md py-sm bg-surface-container-low border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none text-body-md" id="email" placeholder="Enter your email" required="" type="email">
</div>
</div>
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="text-label-md font-label-md text-on-surface-variant" for="password">Password</label>
<a class="text-label-sm font-label-sm text-secondary hover:underline" href="#" id="forgotPassword">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full px-md py-sm bg-surface-container-low border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none text-body-md" id="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<div class="space-y-sm hidden" id="confirmPasswordGroup">
<label class="text-label-md font-label-md text-on-surface-variant" for="confirm-password">Confirm Password</label>
<input class="w-full px-md py-sm bg-surface-container-low border border-outline-variant rounded-lg focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none text-body-md" id="confirm-password" placeholder="••••••••" type="password">
</div>
<button class="w-full bg-secondary-container hover:bg-secondary text-on-secondary font-headline-sm py-sm rounded-lg shadow-sm transition-all transform active:scale-[0.98]" id="submitBtn" type="submit">
                        Sign In
                    </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-base">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 text-label-sm font-label-sm text-on-surface-variant">Or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-sm">
<button class="flex items-center justify-center gap-xs px-md py-sm border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors duration-200">
<svg class="w-5 h-5" viewBox="0 0 24 24">

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-label-sm font-label-sm text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-xs px-md py-sm border border-outline-variant rounded-lg hover:bg-surface-container-low transition-colors duration-200">
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.06.75.79-.02 2.05-.88 3.5-.73 1.43.14 2.53.71 3.2 1.71-3.18 1.94-2.68 6.02.43 7.28-.63 1.58-1.5 3.24-2.19 3.96ZM12.03 7.25c-.02-2.13 1.73-3.93 3.82-4.04.18 2.37-2.16 4.21-3.82 4.04Z" fill="currentColor"></path>
</svg>
<span class="text-label-sm font-label-sm text-on-surface">Apple</span>
</button>
</div>
</div>
<!-- Secondary Actions -->
<div class="bg-surface-container-low p-md flex flex-col items-center gap-sm">
<div class="flex items-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<span class="text-label-sm font-label-sm">SSL SECURE CHECKOUT</span>
</div>
<p class="text-center text-label-sm font-label-sm text-on-tertiary-container opacity-80">
                    Your connection to Pitch Retail is encrypted and secure.
                </p>
</div>

</main>
<!-- Simple Footer -->
<footer class="w-full mt-auto py-md border-t border-outline-variant">
<div class="max-w-7xl mx-auto px-margin-mobile flex flex-col md:flex-row justify-between items-center gap-sm">
<span class="text-label-sm font-label-sm text-on-surface-variant">© 2024 Pitch Retail Performance.</span>
<div class="flex gap-md">
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-secondary transition-colors" href="#">Privacy</a>
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-secondary transition-colors" href="#">Terms</a>
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-secondary transition-colors" href="#">Help</a>
</div>
</div>
</footer>
<script>
        function switchTab(type) {
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const submitBtn = document.getElementById('submitBtn');
            const forgotPassword = document.getElementById('forgotPassword');
            const confirmPasswordGroup = document.getElementById('confirmPasswordGroup');

            if (type === 'login') {
                loginTab.classList.add('tab-active', 'text-on-surface');
                loginTab.classList.remove('text-on-surface-variant');
                signupTab.classList.remove('tab-active', 'text-on-surface');
                signupTab.classList.add('text-on-surface-variant');
                
                submitBtn.innerText = 'Sign In';
                forgotPassword.style.visibility = 'visible';
                confirmPasswordGroup.classList.add('hidden');
            } else {
                signupTab.classList.add('tab-active', 'text-on-surface');
                signupTab.classList.remove('text-on-surface-variant');
                loginTab.classList.remove('tab-active', 'text-on-surface');
                loginTab.classList.add('text-on-surface-variant');
                
                submitBtn.innerText = 'Create Account';
                forgotPassword.style.visibility = 'hidden';
                confirmPasswordGroup.classList.remove('hidden');
            }
        }

        // Form submission animation
        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerHTML = '<span class="flex items-center justify-center gap-sm"><svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Authenticating...</span>';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span>';
                btn.classList.replace('bg-secondary-container', 'bg-green-600');
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerText = originalText;
                    btn.classList.replace('bg-green-600', 'bg-secondary-container');
                }, 2000);
            }, 1500);
        });
    </script>


</body></html>
